<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
    <title>NOVA ENERGIA</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script type="module" src="assets/js/auth.js"></script>
  <script>
    // Redirección inmediata: si hay sesión va a factor-planta, sino a login
    // Esperar a que Firebase cargue y luego decidir a dónde ir
    (async function() {
      let intentos = 0;
      while (typeof window.Auth === 'undefined' && intentos < 40) {
        await new Promise(r => setTimeout(r, 100));
        intentos++;
      }
      await new Promise(r => setTimeout(r, 400)); // dar tiempo a resolver estado auth
      if (window.Auth && window.Auth.current()) {
        window.location.href = 'herramientas/factor-planta.html';
      } else {
        window.location.href = 'login.html';
      }
    })();
  </script>
</head>
<body>
  <div style="padding:40px; text-align:center; color:#7dc97d; font-family: 'Inter', sans-serif;">
    Redirigiendo a Factor de Planta...
  </div>
</body>
</html>
